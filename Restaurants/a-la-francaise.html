<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>À la française - Ohmyfood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Shrikhand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="../css/style.css" />
</head>

<body>
  <header class="header">
    <a href="../index.html" class="header-back">
      <span>←</span>
    </a>
    <h1 class="logo">ohmyfood</h1>
  </header>

  <main class="menu-page">
    <div class="menu-header">
      <img src="../images/restaurants/toa-heftiba-DQKerTsQwi0-unsplash.jpg" alt="À la française">
      <div class="menu-title">
        <h2>À la française</h2>
        <label class="heart-container" onclick="event.stopPropagation();">
          <input type="checkbox" class="heart-checkbox">
          <i class="fa-regular fa-heart heart"></i>
        </label>
      </div>
    </div>

    <section class="menu-content">
      <section class="menu-section">
        <h3>Entrées</h3>
        
        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Tartare de poulpe acidulé</h4>
            <p>Aux zestes d'orange</p>
          </div>
          <div class="menu-item-price">
            <span>25€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Velouté de légumes d'antan</h4>
            <p>Carotte, panais, topinambour</p>
          </div>
          <div class="menu-item-price">
            <span>35€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Soupe à l'oignon</h4>
            <p>Revisitée</p>
          </div>
          <div class="menu-item-price">
            <span>20€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>
      </section>

      <section class="menu-section">
        <h3>Plats</h3>
        
        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Coquilles Saint-Jacques</h4>
            <p>Accompagnées d'une purée de panais</p>
          </div>
          <div class="menu-item-price">
            <span>40€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Magret de canard</h4>
            <p>Et parmentier de pommes de terre</p>
          </div>
          <div class="menu-item-price">
            <span>35€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Pigeonneau d'Ille-et-Vilaine</h4>
            <p>Sur son lit de gnocchis aux légumes</p>
          </div>
          <div class="menu-item-price">
            <span>44€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>
      </section>

      <section class="menu-section">
        <h3>Desserts</h3>
        
        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Pétales de violettes glacés</h4>
            <p>Et purée de noisettes</p>
          </div>
          <div class="menu-item-price">
            <span>18€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Fondant au chocolat</h4>
            <p>Revisité</p>
          </div>
          <div class="menu-item-price">
            <span>22€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Millefeuille croustillant</h4>
            <p>Myrtilles et pâte d'amande</p>
          </div>
          <div class="menu-item-price">
            <span>23€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>
      </section>
    </section>

    <div class="menu-order">
      <a href="#" class="btn">Commander</a>
    </div>

  <footer class="footer">
    <p class="logo">ohmyfood</p>
      <ul>
        <li><a href="#"><i class="fa-solid fa-utensils"></i> Proposer un restaurant</a></li>
        <li><a href="#"><i class="fa-solid fa-handshake-angle"></i> Devenir partenaire</a></li>
        <li><a href="#">Mentions légales</a></li>
        <li><a href="mailto:contact@ohmyfood.com">Contact</a></li>
      </ul>
  </footer>
