<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>La palette du goût - Ohmyfood</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Shrikhand&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
  <header class="header">
    <a href="../index.html" class="header-back">
      <span>←</span>
    </a>
    <h1 class="logo">ohmyfood</h1>
  </header>

  <main class="menu-page">
    <div class="menu-header">
      <img src="../images/restaurants/jay-wennington-N_Y88TWmGwA-unsplash.jpg" alt="La palette du goût">
      <div class="menu-title">
        <h2>La palette du goût</h2>
        <label class="heart-container" onclick="event.stopPropagation();">
          <input type="checkbox" class="heart-checkbox">
          <i class="fa-regular fa-heart heart"></i>
        </label>
      </div>
    </div>

    <section class="menu-content">
      <section class="menu-section">
        <h3>Entrées</h3>
        
        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Fricassée d'escargots</h4>
            <p>Au piment d'Espelette</p>
          </div>
          <div class="menu-item-price">
            <span>25€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Foie gras de canard mi-cuit</h4>
            <p>Et ses copeaux de truffe noire</p>
          </div>
          <div class="menu-item-price">
            <span>35€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Œuf au plat</h4>
            <p>Assaisonné à la truffe sur lit de caviar</p>
          </div>
          <div class="menu-item-price">
            <span>20€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>
      </section>

      <section class="menu-section">
        <h3>Plats</h3>
        
        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Filet de bœuf aux herbes</h4>
            <p>Accompagné de sa ribambelle de légumes</p>
          </div>
          <div class="menu-item-price">
            <span>40€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Parmentier de queue de bœuf</h4>
            <p>À la truffe noire sur sa purée de panais</p>
          </div>
          <div class="menu-item-price">
            <span>35€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Filet de turbot</h4>
            <p>Aux agrumes</p>
          </div>
          <div class="menu-item-price">
            <span>44€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>
      </section>

      <section class="menu-section">
        <h3>Desserts</h3>
        
        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Paris-Brest</h4>
            <p>Revisité</p>
          </div>
          <div class="menu-item-price">
            <span>18€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Macaron au chocolat d'exception</h4>
            <p>Et glace à la vanille de Madagascar</p>
          </div>
          <div class="menu-item-price">
            <span>22€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>

        <label class="menu-item">
          <input type="checkbox" class="menu-item-checkbox">
          <div class="menu-item-content">
            <h4>Mousse au chocolat</h4>
            <p>Au piment d'Espelette et à la truffe noire</p>
          </div>
          <div class="menu-item-price">
            <span>23€</span>
            <i class="fa-solid fa-check check-icon"></i>
          </div>
        </label>
      </section>
    </section>

    <div class="menu-order">
      <a href="#" class="btn">Commander</a>
    </div>

  <footer class="footer">
    <p class="logo">ohmyfood</p>
      <ul>
        <li><a href="#"><i class="fa-solid fa-utensils"></i> Proposer un restaurant</a></li>

        <li><a href="#">Mentions légales</a></li>
        <li><a href="mailto:contact@ohmyfood.com">Contact</a></li>
      </ul>
  </footer>
